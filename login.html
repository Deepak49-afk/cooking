<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Cloud Kitchen</title>
  <meta name="description" content="Login to Cloud Kitchen, the recipe sharing platform.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <h1 class="auth-logo">Cloud Kitchen</h1>
        <p class="auth-subtitle">Welcome back to the kitchen</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="identifier">Username or Email</label>
          <input type="text" id="identifier" class="form-control" placeholder="chef@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe" style="color: var(--text-muted); font-size: 0.9rem;">Remember me for 30 days</label>
        </div>

        <div id="loginError" class="form-error"></div>

        <button type="submit" class="btn btn-full">Log In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
