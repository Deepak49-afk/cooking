<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Cloud Kitchen</title>
  <meta name="description" content="Create an account on Cloud Kitchen, the recipe sharing platform.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-header">
        <h1 class="auth-logo">Cloud Kitchen</h1>
        <p class="auth-subtitle">Join our community of chefs</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="masterchef99" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="chef@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="role">Account Type</label>
          <select id="role" class="form-control">
            <option value="customer">Customer</option>
            <option value="chef">Chef</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div id="signupError" class="form-error"></div>

        <button type="submit" class="btn btn-full" style="margin-top: 1rem;">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
